<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOA Cockpit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',sans-serif; background:transparent; color:#fff;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:6px;
  }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:100%; max-width:960px; }
  .card {
    background:#0d0d0d; border:1px solid #1a1a1a; border-radius:12px;
    padding:16px 14px; position:relative; overflow:hidden;
  }
  .card .top { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .card .top .icon { font-size:15px; width:20px; text-align:center; }
  .card .top .label { font-size:9px; color:#555; text-transform:uppercase; letter-spacing:1.2px; font-weight:500; }
  .card .number { font-size:32px; font-weight:800; letter-spacing:-1px; line-height:1; margin-bottom:2px; }
  .card .number .unit { font-size:13px; font-weight:400; color:#555; letter-spacing:0; }
  .card .sub { font-size:10px; color:#444; margin-top:2px; }
  .bar-wrap { height:3px; background:#181818; border-radius:2px; margin-top:10px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; background:#fff; width:0%; }
  .pipe-row { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
  .pipe-item { flex:1; min-width:30px; text-align:center; background:#111; border-radius:4px; padding:4px 2px; }
  .pipe-item .p-num { font-size:13px; font-weight:700; }
  .pipe-item .p-lbl { font-size:6px; color:#444; text-transform:uppercase; letter-spacing:0.3px; margin-top:1px; }
  .action-item { display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid #141414; font-size:10px; }
  .action-item:last-child { border-bottom:none; }
  .action-item .dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
  .action-item .dot.urgent { background:#ef4444; }
  .action-item .dot.normal { background:#fff; }
  .action-item .name { color:#ccc; flex:1; }
  .action-item .tag { font-size:7px; padding:1px 4px; border-radius:2px; text-transform:uppercase; letter-spacing:0.3px; }
  .action-item .tag.do { background:#fff; color:#000; }
  .action-item .tag.wait { border:1px solid #333; color:#555; }
  .veille-item { display:flex; gap:8px; padding:6px 0; border-bottom:1px solid #141414; }
  .veille-item:last-child { border-bottom:none; }
  .veille-item .v-icon { font-size:12px; width:16px; flex-shrink:0; }
  .veille-item .v-content { flex:1; min-width:0; }
  .veille-item .v-company { font-size:10px; font-weight:600; }
  .veille-item .v-title { font-size:9px; color:#888; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .veille-item .v-badge { font-size:7px; padding:1px 4px; border-radius:2px; flex-shrink:0; align-self:flex-start; }
  .veille-item .v-badge.new { background:#fff; color:#000; }
  .veille-item .v-badge.old { border:1px solid #222; color:#444; }
  .footer { text-align:center; font-size:7px; color:#333; margin-top:4px; grid-column:1/-1; }
  @media (max-width:640px) { .grid { grid-template-columns:repeat(2,1fr); } }
  @media (max-width:400px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="grid">
  <div class="card">
    <div class="top"><span class="icon">🎯</span><span class="label">Objectif</span></div>
    <div class="number">0<span class="unit">/2</span></div>
    <div class="sub">Discovery Meetings</div>
    <div class="bar-wrap"><div class="bar-fill" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="top"><span class="icon">⚡</span><span class="label">Aujourd'hui</span></div>
    <div style="color:#444;font-size:10px;padding:8px 0;text-align:center;">Aucune action aujourd'hui</div>
  </div>
  <div class="card">
    <div class="top"><span class="icon">📰</span><span class="label">Veille</span></div>
    <div style="color:#444;font-size:10px;padding:8px 0;text-align:center;">Aucune actualité</div>
  </div>
  <div class="card">
    <div class="top"><span class="icon">📊</span><span class="label">Pipeline</span></div>
    <div class="number">0<span class="unit"> cibles</span></div>
    <div class="sub">dans le pipeline</div>
    <div class="pipe-row"><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">À qualifier</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">Prêt</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">Contact</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">R1</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">R2</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">Réponse</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">DM</div>
  </div><div class="pipe-item">
    <div class="p-num">0</div>
    <div class="p-lbl">Perdu</div>
  </div></div>
  </div>
  <div class="footer">Mis à jour le 2026-07-05 · Données Notion</div>
</div>
</body>
</html>
