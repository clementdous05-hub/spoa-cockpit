<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOA Cockpit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:transparent; color:#eee; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4px; }
  
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; width:100%; max-width:900px; }
  
  .ilot {
    background:#111; border:1px solid #1e1e1e; border-radius:10px; padding:12px 10px;
    text-align:center; position:relative; overflow:hidden;
    transition:transform 0.2s ease, border-color 0.2s ease;
  }
  .ilot:hover { transform:translateY(-1px); border-color:#333; }
  
  .ilot .icon { font-size:16px; margin-bottom:4px; }
  .ilot .label { font-size:8px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .ilot .value { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  .ilot .sub { font-size:9px; color:#555; margin-top:2px; }
  
  /* Barre de progression pour l'objectif */
  .ilot .bar { height:3px; background:#181818; border-radius:2px; margin-top:6px; overflow:hidden; }
  .ilot .bar .fill { height:100%; border-radius:2px; background:#22c55e; width:0%; transition:width 1.5s cubic-bezier(0.4,0,0.2,1); }
  
  /* Animations */
  .ilot .value.anim { animation: countUp 0.8s ease-out; }
  @keyframes countUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  
  /* Pulsation douce pour les chiffres */
  .ilot .value.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  
  @media (max-width:500px) { .grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div class="grid">
  <div class="ilot" id="ilot1">
    <div class="icon">🎯</div>
    <div class="label">Objectif</div>
    <div class="value anim" id="val1">0</div>
    <div class="sub">/ 2 Discovery Meetings</div>
    <div class="bar"><div class="fill" id="bar1"></div></div>
  </div>
  <div class="ilot" id="ilot2">
    <div class="icon">⚡</div>
    <div class="label">Aujourd'hui</div>
    <div class="value anim" id="val2">0</div>
    <div class="sub">actions à faire</div>
  </div>
  <div class="ilot" id="ilot3">
    <div class="icon">📰</div>
    <div class="label">Veille</div>
    <div class="value anim" id="val3">0</div>
    <div class="sub">nouvelles opportunités</div>
  </div>
  <div class="ilot" id="ilot4">
    <div class="icon">📊</div>
    <div class="label">Pipeline</div>
    <div class="value anim" id="val4">0</div>
    <div class="sub">cibles en cours</div>
  </div>
</div>

<script>
// ── Données fictives animées ──
const data = {
  objectif: { current: 0, target: 1 },
  actions: { current: 0, target: 3 },
  veille: { current: 0, target: 4 },
  pipeline: { current: 0, target: 12 },
};

function animateValue(el, start, end, duration) {
  const range = end - start;
  const startTime = performance.now();
  function step(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + range * eased);
    el.textContent = current;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Animer la barre de progression
function animateBar(el, pct) {
  setTimeout(() => { el.style.width = pct + '%'; }, 300);
}

// Lancer les animations au chargement
setTimeout(() => {
  animateValue(document.getElementById('val1'), data.objectif.current, data.objectif.target, 1200);
  animateValue(document.getElementById('val2'), data.actions.current, data.actions.target, 1000);
  animateValue(document.getElementById('val3'), data.veille.current, data.veille.target, 900);
  animateValue(document.getElementById('val4'), data.pipeline.current, data.pipeline.target, 1100);
  animateBar(document.getElementById('bar1'), (data.objectif.target / 2) * 100);
}, 200);
</script>
</body>
</html>
