<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOA Cockpit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #181818;
    --border: #1e1e1e; --text: #eee; --text2: #666; --accent: #fff;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --blue: #3b82f6;
  }
  html, body { font-family:'Inter',sans-serif; background:#0a0a0a !important; color:var(--text); min-height:100vh; padding:20px; margin:0; }
  .container { max-width:1100px; margin:0 auto; background:transparent !important; }
  .notion-link { display:block; text-decoration:none; color:inherit; }
  .notion-link:hover .objectif,
  .notion-link:hover .timeline,
  .notion-link:hover .actions,
  .notion-link:hover .veille,
  .notion-link:hover .pipeline { background:var(--surface2); }
  .header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; margin-bottom:24px; border-bottom:1px solid var(--border); }
  .header h1 { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
  .header h1 span { color:var(--text2); font-weight:400; }
  .header .meta { font-size:11px; color:var(--text2); text-align:right; }
  .header .meta .day { font-size:13px; color:var(--text); font-weight:500; }
  .section-title { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
  .objectif { background:rgba(17,17,17,0.85); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; display:flex; align-items:center; gap:24px; }
  .objectif .left { flex-shrink:0; }
  .objectif .left .big { font-size:36px; font-weight:800; letter-spacing:-1px; }
  .objectif .left .big .done { color:var(--green); }
  .objectif .left .big .total { color:var(--text2); }
  .objectif .left .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .objectif .right { flex:1; }
  .objectif .right .title { font-size:14px; font-weight:600; margin-bottom:6px; }
  .objectif .right .sub { font-size:12px; color:var(--text2); margin-bottom:10px; }
  .objectif .bar { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
  .objectif .bar .fill { height:100%; border-radius:2px; background:var(--green); transition:width 0.8s ease; }
  .objectif .bar .pct { font-size:10px; color:var(--text2); margin-top:4px; }
  .timeline { background:rgba(17,17,17,0.85); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  .cal-grid { display:grid; grid-template-columns:1fr; gap:4px; }
  .cal-day { display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:6px; background:var(--surface2); border-left:2px solid var(--border); }
  .cal-day.today { border-left-color:var(--blue); background:rgba(59,130,246,0.08); }
  .cal-day.deadline { border-left-color:var(--red); background:rgba(239,68,68,0.08); }
  .cal-day.past { opacity:0.6; }
  .cal-date { font-size:11px; font-weight:600; color:var(--text2); min-width:80px; flex-shrink:0; }
  .cal-action { font-size:12px; color:var(--text); }
  .actions { background:rgba(17,17,17,0.85); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  .actions-empty { text-align:center; padding:24px; color:var(--text2); font-size:13px; }
  .actions-empty .icon { font-size:24px; margin-bottom:8px; }
  .action-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .action-item:last-child { border-bottom:none; }
  .action-item .check { width:16px; height:16px; border:1.5px solid var(--text2); border-radius:3px; flex-shrink:0; }
  .action-item .info { flex:1; }
  .action-item .info .company { font-size:13px; font-weight:600; }
  .action-item .info .task { font-size:11px; color:var(--text2); margin-top:1px; }
  .action-item .tag { font-size:9px; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:0.5px; flex-shrink:0; }
  .tag.contact { background:#1a1a2e; color:var(--blue); }
  .tag.relance { background:#1e1a0e; color:var(--yellow); }
  .tag.retard { background:#1e0e0e; color:var(--red); }
  .veille { background:rgba(17,17,17,0.85); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  .veille-item { display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--border); }
  .veille-item:last-child { border-bottom:none; }
  .veille-item .source { width:20px; flex-shrink:0; font-size:16px; }
  .veille-item .content { flex:1; }
  .veille-item .content .company { font-size:13px; font-weight:600; }
  .veille-item .content .title { font-size:12px; color:var(--text); margin-top:1px; }
  .veille-item .content .meta { font-size:10px; color:var(--text2); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }
  .veille-item .content .meta a { color:var(--blue); text-decoration:none; }
  .veille-item .content .meta a:hover { text-decoration:underline; }
  .veille-item .status { font-size:9px; padding:2px 6px; border-radius:3px; flex-shrink:0; align-self:flex-start; }
  .status.exploite { background:#0e1e0e; color:var(--green); }
  .status.nouveau { background:#1e1a0e; color:var(--yellow); }
  .pipeline { background:rgba(17,17,17,0.85); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  .pipe-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .pipe-stage { text-align:center; padding:12px; background:var(--surface2); border-radius:6px; }
  .pipe-stage .lbl { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
  .pipe-stage .cnt { font-size:22px; font-weight:800; margin:4px 0; }
  .pipe-stage .sub { font-size:9px; color:var(--text2); }
  .footer { text-align:center; padding:16px 0; border-top:1px solid var(--border); font-size:10px; color:var(--text2); }
  .loading { text-align:center; padding:40px; color:var(--text2); font-size:14px; }
  @media (max-width:768px) {
    .objectif { flex-direction:column; gap:12px; }
    .pipe-grid { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">🔄 Chargement des données...</div>
</div>

<script>
const DATA_URL = 'https://clementdous05-hub.github.io/spoa-cockpit/data.json';

const stageLabels = [
  {lbl:'À qualifier',key:'aQualifier',sub:'cibles'},
  {lbl:'Prêt à contacter',key:'pretAContacter',sub:'cibles'},
  {lbl:'1er contact',key:'premierContact',sub:'envoyé'},
  {lbl:'Relance 1',key:'relance1',sub:'cibles'},
  {lbl:'Relance 2',key:'relance2',sub:'cibles'},
  {lbl:'Réponse',key:'reponse',sub:'reçue'},
  {lbl:'Discovery',key:'discovery',sub:'meeting'},
  {lbl:'Perdu',key:'perdu',sub:'cibles'},
];

function tagClass(statut) {
  if (statut === 'À contacter' || statut === 'Prêt à contacter' || statut === '1er contact envoyé') return 'contact';
  if (statut === 'Relance N+1') return 'relance';
  if (statut === 'Relance N+2') return 'retard';
  return 'contact';
}

function tagLabel(tag) {
  return {contact:'À faire',relance:'Relance',retard:'En retard'}[tag] || 'À faire';
}

function render(data) {
  const p = data.pipeline;
  const app = document.getElementById('app');

  // Calendrier
  let calendrierHtml = '';
  data.calendrier.forEach(j => {
    const cls = 'cal-day' + (j.today ? ' today' : '') + (j.deadline ? ' deadline' : '') + (j.past ? ' past' : '');
    const checkIcon = j.past ? '✅' : (j.today ? '◻️' : '⬜');
    calendrierHtml += `<div class="${cls}">
      <div class="cal-date">${j.date}</div>
      <div class="cal-action">${checkIcon} ${j.action}</div>
    </div>`;
  });

  // Actions
  let actionsHtml = '';
  if (data.actions.length > 0) {
    data.actions.forEach(a => {
      const tag = tagClass(a.tag);
      actionsHtml += `<div class="action-item"><div class="check"></div><div class="info"><div class="company">${a.company}</div><div class="task">${a.task}</div></div><div class="tag ${tag}">${tagLabel(tag)}</div></div>`;
    });
  } else {
    actionsHtml = '<div class="actions-empty"><div class="icon">✅</div><div>Aucune action prévue aujourd\'hui</div></div>';
  }

  // Veille
  let veilleHtml = '';
  if (data.veille.length > 0) {
    data.veille.forEach(v => {
      const linkHtml = v.link ? `<a href="${v.link}" target="_blank">🔗 Lire article</a>` : '';
      veilleHtml += `<div class="veille-item"><div class="source">${v.source}</div><div class="content"><div class="company">${v.company}</div><div class="title">${v.title}</div><div class="meta"><span>🏷️ ${v.sourceName}</span>${linkHtml}</div></div><div class="status nouveau">Nouveau</div></div>`;
    });
  } else {
    veilleHtml = '<div class="actions-empty"><div class="icon">📡</div><div>Aucune actualité détectée</div></div>';
  }

  // Pipeline
  let pipelineHtml = '';
  stageLabels.forEach(s => {
    pipelineHtml += `<div class="pipe-stage"><div class="lbl">${s.lbl}</div><div class="cnt">${p[s.key]}</div><div class="sub">${s.sub}</div></div>`;
  });

  app.innerHTML = `
    <div class="header">
      <h1>🎯 SPOA <span>Cockpit</span></h1>
      <div class="meta">
        <div class="day">${data.day_name}</div>
        <div>${data.date_str}</div>
      </div>
    </div>
    <a href="https://app.notion.com/p/Spoa-Prospection-3920915405aa81a7b4add78573d08458" target="_blank" rel="noopener" class="notion-link">
    <div class="objectif">
      <div class="left">
        <div class="big"><span class="done">${data.jours_restants}</span><span class="total">j</span></div>
        <div class="label">Restants</div>
      </div>
      <div class="right">
        <div class="title">🎯 Mission : Envoyer la page prospection à Orel</div>
        <div class="sub">Deadline : 7 juillet 2026 · Brief Orel</div>
        <div class="bar"><div class="fill" style="width:${data.pct_mission}%"></div></div>
        <div class="pct">${data.pct_mission}% atteint · ${data.jours_restants} jour(s) restant(s)</div>
      </div>
    </div>
    </a>
    <a href="https://app.notion.com/p/Spoa-Prospection-3920915405aa81a7b4add78573d08458" target="_blank" rel="noopener" class="notion-link">
    <div class="timeline">
      <div class="section-title">📅 Calendrier — 4 au 18 juillet</div>
      <div class="cal-grid">${calendrierHtml}</div>
    </div>
    </a>
    <a href="https://app.notion.com/p/2257b79ba8e54f40a1343c8465308e59" target="_blank" rel="noopener" class="notion-link">
    <div class="actions">
      <div class="section-title">⚡ Mes actions aujourd\'hui (${data.actions_count})</div>
      ${actionsHtml}
    </div>
    </a>
    <a href="https://app.notion.com/p/SPO-Prospect-Tracker-3940915405aa813299e6d66e57cdb832" target="_blank" rel="noopener" class="notion-link">
    <div class="veille">
      <div class="section-title">📰 Veille — Nouvelles opportunités (${data.actualites_count})</div>
      ${veilleHtml}
    </div>
    </a>
    <a href="https://app.notion.com/p/2257b79ba8e54f40a1343c8465308e59" target="_blank" rel="noopener" class="notion-link">
    <div class="pipeline">
      <div class="section-title">📊 Pipeline — ${data.prospects_count} cibles</div>
      <div class="pipe-grid">${pipelineHtml}</div>
    </div>
    </a>
    <div class="footer">SPOA Cockpit · Dernière mise à jour : ${data.updated_at} · Données live depuis Notion</div>
  `;
}

// ── Fetch data.json et render ──
fetch(DATA_URL)
  .then(r => r.json())
  .then(data => render(data))
  .catch(err => {
    document.getElementById('app').innerHTML = '<div class="loading">❌ Erreur de chargement des données</div>';
    console.error('Fetch error:', err);
  });

// Re-fetch toutes les 15 secondes pour le temps réel
setInterval(() => {
  fetch(DATA_URL + '?_=' + Date.now())
    .then(r => r.json())
    .then(data => render(data))
    .catch(() => {});
}, 15 * 1000);
</script>
</body>
</html>
